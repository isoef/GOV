<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة معلومات الحوكمة</title>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

  <style>
    /* =========================
       Governance Dashboard 2.0 (Single-file)
       Modern + Formal | RTL | Stable-ish data
       ========================= */
    :root{
      --c1:#006250;   /* primary */
      --c2:#273233;   /* dark */
      --c3:#15adff;   /* accent */

      --bg:#ffffff;
      --panel:#f7f9fb;
      --card:#ffffff;
      --line:#e6edf2;
      --muted:#6b7280;

      --r:22px;
      --shadow:0 16px 44px rgba(39,50,51,.10);
      --shadowSoft:0 18px 40px rgba(39,50,51,.12);
      --shadowFocus:0 20px 48px rgba(21,173,255,.14);

      --ok: rgba(0,98,80,.10);
      --warn: rgba(21,173,255,.12);
      --bad: rgba(39,50,51,.10);

      --maxw: 1200px;
    }

    body{
      margin:0;
      background:var(--bg);
      font-family:"Almarai", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--c2);
    }
    *{box-sizing:border-box}

    .gd-wrap{
      max-width:var(--maxw);
      margin:0 auto;
      padding:22px 14px 34px;
    }

    /* =========================
       HEADER
       ========================= */
    .gd-header{
      display:flex;
      flex-wrap:wrap;
      gap:12px 14px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }
    .gd-title{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:240px;
    }
    .gd-title h1{
      margin:0;
      font-size:18px;
      font-weight:900;
      letter-spacing:.2px;
      color:var(--c2);
    }
    .gd-sub{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      line-height:1.7;
    }

    .gd-controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-start;
    }

    .pill{
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
    }

    button{
      border:none;
      background:transparent;
      color:var(--c2);
      padding:8px 14px;
      border-radius:999px;
      cursor:pointer;
      font-family:inherit;
      font-size:13px;
      font-weight:800;
      transition:transform .18s ease, box-shadow .18s ease, background .25s ease, color .25s ease;
      outline:none;
      user-select:none;
      white-space:nowrap;
    }
    button:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 18px rgba(39,50,51,.10);
      background:#eef7ff;
    }
    button.active{
      background:linear-gradient(135deg,var(--c2),var(--c1));
      color:#fff;
      box-shadow:0 16px 30px rgba(0,98,80,.22);
      transform:translateY(-1px);
    }

    .gd-dates{
      display:flex; gap:8px; align-items:center;
      padding:8px 10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
    }
    .gd-dates label{
      font-size:12px; color:var(--muted); font-weight:800;
    }
    input[type="date"]{
      border:1px solid var(--line);
      background:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-family:inherit;
      font-size:12px;
      color:var(--c2);
      outline:none;
    }

    .gd-select{
      display:flex; gap:8px; align-items:center;
      padding:8px 10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
    }
    .gd-select select{
      border:1px solid var(--line);
      background:#fff;
      padding:7px 10px;
      border-radius:999px;
      font-family:inherit;
      font-size:12px;
      color:var(--c2);
      outline:none;
      min-width:170px;
      font-weight:800;
    }

    .gd-actions{
      display:flex; gap:8px; align-items:center;
    }
    .gd-actions .ghost{
      border:1px solid var(--line);
      background:#fff;
    }
    .gd-actions .ghost.active{
      background:linear-gradient(135deg,var(--c3),var(--c1));
      box-shadow:0 16px 30px rgba(21,173,255,.16);
    }

    /* =========================
       EXEC SUMMARY
       ========================= */
    .gd-summary{
      border:1px solid var(--line);
      border-radius:var(--r);
      background:linear-gradient(135deg, rgba(21,173,255,.10), rgba(0,98,80,.08), #fff);
      box-shadow:var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
      margin-bottom:14px;
    }
    .gd-summary::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(circle at 16% 28%, rgba(21,173,255,.18), transparent 40%),
        radial-gradient(circle at 86% 42%, rgba(0,98,80,.12), transparent 45%);
      pointer-events:none;
    }

    .sum-top{
      position:relative;
      display:flex;
      flex-wrap:wrap;
      gap:10px 14px;
      align-items:flex-end;
      justify-content:space-between;
      margin-bottom:12px;
    }
    .sum-main .label{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
    }
    .sum-main .value{
      font-size:42px;
      font-weight:900;
      line-height:1;
      color:#000;
    }

    .chip{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      font-weight:900;
      color:var(--c2);
      width:max-content;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background:var(--c1);
      box-shadow:0 0 0 6px rgba(0,98,80,.10);
    }

    .bar{
      height:10px;
      background:#eef2f6;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      position:relative;
    }
    .bar > span{
      display:block;
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--c1),var(--c3));
      transition:width .65s ease;
      position:relative;
      overflow:hidden;
    }
    .bar > span::after{
      content:"";
      position:absolute; top:0; left:-45%;
      width:45%; height:100%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,.75), transparent);
      opacity:0;
      transition:opacity .2s ease;
    }
    .gd-summary:hover .bar > span::after,
    .card:hover .bar > span::after{
      opacity:1;
      animation:flow 2.4s linear infinite;
    }
    @keyframes flow{0%{left:-45%}100%{left:120%}}

    .sum-kpis{
      position:relative;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }
    @media (max-width: 980px){
      .sum-kpis{grid-template-columns:repeat(2, minmax(0,1fr));}
    }
    @media (max-width: 520px){
      .sum-kpis{grid-template-columns:1fr;}
    }
    .sum-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .sum-box:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(39,50,51,.10);
    }
    .sum-box .t{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:6px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .sum-box .n{
      font-size:18px;
      font-weight:900;
      color:#000;
      display:flex;
      align-items:baseline;
      gap:6px;
    }
    .sum-box .unit{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
    }
    .trend{
      font-size:12px;
      font-weight:900;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--c2);
      white-space:nowrap;
    }
    .trend.up{border-color:rgba(0,98,80,.25); background:rgba(0,98,80,.06)}
    .trend.down{border-color:rgba(39,50,51,.25); background:rgba(39,50,51,.06)}
    .trend.flat{border-color:rgba(21,173,255,.25); background:rgba(21,173,255,.06)}

    /* =========================
       GRID
       ========================= */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(275px, 1fr));
      gap:14px;
      margin-top:10px;
    }

    .card{
      background:linear-gradient(135deg, rgba(21,173,255,.06), rgba(0,98,80,.05), #fff);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:16px;
      box-shadow:0 10px 26px rgba(39,50,51,.07);
      cursor:pointer;
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      position:relative;
      overflow:hidden;
    }
    .card:hover{
      transform:translateY(-4px);
      border-color:rgba(21,173,255,.35);
      box-shadow:var(--shadowSoft);
    }
    .card.active{
      border-color:rgba(0,98,80,.40);
      box-shadow:var(--shadowFocus);
      transform:translateY(-2px);
    }

    /* subtle status tint */
    .card[data-status="good"]{ background:linear-gradient(135deg, var(--ok), rgba(255,255,255,.9)); }
    .card[data-status="warn"]{ background:linear-gradient(135deg, var(--warn), rgba(255,255,255,.9)); }
    .card[data-status="bad"] { background:linear-gradient(135deg, var(--bad), rgba(255,255,255,.92)); }

    .top{
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    .name{
      font-size:13px; font-weight:900; color:var(--c2);
      line-height:1.55;
    }
    .meta{
      font-size:12px; color:var(--muted); font-weight:800;
      margin-top:4px;
      line-height:1.6;
    }
    .value{
      font-size:34px;
      font-weight:900;
      color:#000;
      line-height:1.1;
      text-align:left;
      white-space:nowrap;
      display:flex;
      align-items:baseline;
      gap:6px;
    }
    .u{
      font-size:12px; color:var(--muted); font-weight:900;
    }

    .status{
      margin-top:10px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .chipStatus{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:900;
      color:var(--c2);
      width:max-content;
    }
    .s-dot{
      width:8px; height:8px; border-radius:50%;
      background:var(--c1);
      box-shadow:0 0 0 5px rgba(0,98,80,.10);
    }
    .chipStatus.warn .s-dot{background:var(--c3); box-shadow:0 0 0 5px rgba(21,173,255,.12)}
    .chipStatus.bad  .s-dot{background:var(--c2); box-shadow:0 0 0 5px rgba(39,50,51,.12)}

    .mini{
      margin-top:10px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
    }
    .mini .b{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      min-height:64px;
    }
    .mini .b span{
      display:block; font-size:11px; color:var(--muted); font-weight:900;
      margin-bottom:4px;
    }
    .mini .b strong{
      display:block; font-size:13px; color:var(--c2); font-weight:900;
      line-height:1.4;
    }
    .num{color:#000}

    /* =========================
       DETAILS
       ========================= */
    .details{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:var(--r);
      background:linear-gradient(135deg, rgba(21,173,255,.06), rgba(0,98,80,.05), #fff);
      box-shadow:var(--shadow);
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .details h3{
      margin:0 0 8px;
      font-size:16px;
      font-weight:900;
      color:var(--c2);
      line-height:1.6;
    }
    .hint{
      margin:0 0 12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      font-weight:800;
    }

    .detailsGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
    }
    .box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .box:hover{ transform:translateY(-2px); box-shadow:0 16px 30px rgba(39,50,51,.10); }
    .box span{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:6px;
    }
    .box strong{
      display:block;
      font-size:14px;
      color:var(--c2);
      font-weight:900;
      line-height:1.85;
      white-space:pre-line;
    }

    .hist{
      margin-top:10px;
      display:flex; gap:6px; align-items:flex-end;
      height:44px;
    }
    .hist i{
      display:block;
      width:100%;
      max-width:18px;
      flex:1;
      border-radius:999px;
      background:linear-gradient(180deg,var(--c3), var(--c1));
      opacity:.85;
      transform-origin:bottom;
      transition:transform .18s ease;
    }
    .box:hover .hist i{transform:scaleY(1.03)}

    /* =========================
       PRESENTATION MODE
       ========================= */
    body.presentation .gd-wrap{max-width:1400px}
    body.presentation .gd-controls{display:none}
    body.presentation .gd-title h1{font-size:20px}
    body.presentation .grid{grid-template-columns:repeat(auto-fit, minmax(320px, 1fr))}
    body.presentation .card .value{font-size:38px}

  </style>
</head>

<body>
  <div class="gd-wrap">

    <div class="gd-header">
      <div class="gd-title">
        <h1>لوحة معلومات الحوكمة</h1>
        <div class="gd-sub" id="subtitle">بيانات تشغيلية تقديرية • تعكس حالة الحوكمة عبر مجالات متعددة (ثابتة نسبيًا)</div>
      </div>

      <div class="gd-controls">

        <div class="pill" aria-label="Levels">
          <button type="button" class="active" data-level="exec">تنفيذي</button>
          <button type="button" data-level="sup">إشرافي</button>
          <button type="button" data-level="ops">تشغيلي</button>
        </div>

        <div class="pill" aria-label="Periods">
          <button type="button" class="active" data-period="daily">يومي</button>
          <button type="button" data-period="weekly">أسبوعي</button>
          <button type="button" data-period="monthly">شهري</button>
          <button type="button" data-period="quarterly">ربعي</button>
        </div>

        <div class="gd-dates" aria-label="Date Range">
          <label>من</label><input type="date" id="from">
          <label>إلى</label><input type="date" id="to">
        </div>

        <div class="gd-select" aria-label="Filters">
          <select id="filterDomain" title="المجال">
            <option value="all">كل المجالات</option>
          </select>
          <select id="filterOwner" title="المالك">
            <option value="all">كل الملاك</option>
          </select>
          <select id="filterStatus" title="الحالة">
            <option value="all">كل الحالات</option>
            <option value="good">مستقر</option>
            <option value="warn">مراقبة</option>
            <option value="bad">تدخل</option>
          </select>
        </div>

        <div class="gd-select" aria-label="Sort">
          <select id="sortBy" title="الفرز">
            <option value="risk">الأكثر خطورة أولاً</option>
            <option value="gap">الأعلى فجوة</option>
            <option value="name">الاسم (أ-ي)</option>
          </select>
        </div>

        <div class="gd-actions">
          <button type="button" class="ghost" id="btnPresent">وضع عرض</button>
          <button type="button" class="ghost" id="btnReset">إعادة ضبط</button>
        </div>

      </div>
    </div>

    <!-- EXEC SUMMARY -->
    <div class="gd-summary" id="summary">
      <div class="sum-top">
        <div class="sum-main">
          <div class="label">مؤشر صحة الحوكمة العام</div>
          <div class="value" id="overallVal">0%</div>
        </div>

        <div class="chip">
          <span class="dot" id="overallDot"></span>
          <span id="overallLabel">—</span>
        </div>
      </div>

      <div class="bar"><span id="overallBar" style="width:0%"></span></div>

      <div class="sum-kpis" id="sumKpis"></div>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid"></div>

    <!-- DETAILS -->
    <div class="details" id="details">
      <h3>اختر مؤشرًا</h3>
      <p class="hint">اضغط على أي بطاقة لعرض التفاصيل والأدلة وخطة الإجراء. البيانات ثابتة نسبيًا لتعكس القياس التشغيلي الواقعي.</p>
    </div>

  </div>

<script>
(function(){
  try{
    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));

    const grid = $("#grid");
    const details = $("#details");
    const subtitle = $("#subtitle");

    const overallVal = $("#overallVal");
    const overallBar = $("#overallBar");
    const overallLabel = $("#overallLabel");
    const overallDot = $("#overallDot");
    const sumKpis = $("#sumKpis");

    const fromInput = $("#from");
    const toInput = $("#to");

    const levelBtns = $$("[data-level]");
    const periodBtns = $$("[data-period]");

    const filterDomain = $("#filterDomain");
    const filterOwner  = $("#filterOwner");
    const filterStatus = $("#filterStatus");
    const sortBy = $("#sortBy");

    const btnPresent = $("#btnPresent");
    const btnReset = $("#btnReset");

    let level = "exec";
    let period = "daily";
    let activeIdx = 0;

    /* =========================
       KPI CATALOG (General Governance)
       - Domains: Strategy, Risk, Compliance, Data, Security, Finance, Delivery, CX, Ops, People
       - Stable base values closer to reality (not all 90+)
       ========================= */
    const DATA = [
      /* EXEC (governance/strategy) */
      { id:"gov_decision_log", level:"exec", domain:"الحوكمة والقرار", name:"اكتمال سجل القرارات والتصعيد", unit:"%", target:100, better:"high",
        def:"توثيق قرارات اللجان والتصعيدات مع المبررات والتواريخ وملاك الإجراء.",
        owner:"لجنة التوجيه", source:"Minutes/Decision Log",
        evidence:["سجل قرارات محدث","محاضر لجنة","قائمة إجراءات مرتبطة بالقرار"],
        risk:"قرارات غير موثقة تؤدي لتضارب تنفيذ وتأخر معالجة الانحرافات.",
        formula:"(قرارات موثقة ÷ القرارات الفعلية) × 100",
        base:92, volatility:"low", last:"قبل 2 يوم", trend:"up"
      },
      { id:"gov_policy_coverage", level:"exec", domain:"السياسات والامتثال", name:"تغطية السياسات الأساسية", unit:"%", target:95, better:"high",
        def:"نسبة السياسات الحاكمة المعتمدة والمطبقة (حوكمة، أمن، خصوصية، مشتريات، تعاقدات).",
        owner:"الامتثال", source:"Policy Register",
        evidence:["Policy register","اعتمادات","خطة نشر/تطبيق"],
        risk:"قصور السياسات يرفع مخاطر الالتزام ويضعف المساءلة.",
        formula:"(سياسات معتمدة ومطبقة ÷ سياسات مطلوبة) × 100",
        base:88, volatility:"med", last:"قبل 5 أيام", trend:"flat"
      },
      { id:"gov_okrs_ach", level:"exec", domain:"الاستراتيجية والأداء", name:"تحقق أهداف الأداء الاستراتيجي", unit:"%", target:85, better:"high",
        def:"نسبة تحقق أهداف الأداء المرتبطة بالحوكمة وفق OKRs/KPIs المعتمدة.",
        owner:"PMO", source:"Performance Dashboard",
        evidence:["لوحة OKRs","تحديث شهري","تحليل فجوات"],
        risk:"تحقق منخفض يعني خلل تصميم/تنفيذ أو ضعف متابعة.",
        formula:"(الأهداف المتحققة ÷ إجمالي الأهداف) × 100",
        base:82, volatility:"med", last:"قبل أسبوع", trend:"down"
      },
      { id:"fin_budget_control", level:"exec", domain:"المالية", name:"الالتزام بالميزانية ضمن الهامش", unit:"%", target:95, better:"high",
        def:"الإنفاق ضمن المعتمد مع ضبط التغييرات (±5%) وإظهار الانحرافات بوضوح.",
        owner:"المالية", source:"Financial Reports",
        evidence:["تقرير صرف","سجل تغييرات","تسويات"],
        risk:"تجاوز مالي يهدد الاستدامة ويؤخر الأولويات.",
        formula:"(الإنفاق ضمن الهامش ÷ المعتمد) × 100",
        base:93, volatility:"low", last:"قبل 3 أيام", trend:"up"

    /* =========================
       Stable deterministic values
       - Not random every refresh
       - Varies when you change period/level/date
       ========================= */
    function hashStr(s){
      let h=2166136261;
      for(let i=0;i<s.length;i++){
        h^=s.charCodeAt(i);
        h=Math.imul(h,16777619);
      }
      return (h>>>0);
    }
    function rand01(seed){
      seed ^= seed << 13; seed >>>= 0;
      seed ^= seed >> 17; seed >>>= 0;
      seed ^= seed << 5;  seed >>>= 0;
      return (seed >>> 0) / 4294967295;
    }
    function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
    function daysBetween(a,b){
      const da=new Date(a), db=new Date(b);
      const diff=(db-da)/(1000*60*60*24);
      if(!isFinite(diff)) return 0;
      return Math.abs(Math.round(diff));
    }
    function periodAmp(p){
      // subtle changes only
      return p==="daily" ? 0.010 :
             p==="weekly"? 0.016 :
             p==="monthly"?0.022 : 0.028;
    }
    function volAmp(v){
      return v==="low" ? 0.55 : v==="med" ? 0.85 : 1.10;
    }

    function computeValue(ind){
      const from = fromInput?.value || "";
      const to   = toInput?.value || "";
      const d = (from && to) ? daysBetween(from,to) : 0;
      const dateInfluence = clamp(d/160, 0, 1) * 0.020;

      const seed = hashStr(ind.id+"|"+level+"|"+period+"|"+from+"|"+to);
      const r = rand01(seed);
      const n = (r - 0.5) * 2; // -1..1

      const amp = (periodAmp(period) + dateInfluence) * volAmp(ind.volatility);

      let val = ind.base * (1 + n * amp);

      if(ind.unit === "%"){
        val = Math.round(clamp(val, 0, 100));
      } else if(ind.unit === ""){
        // counts: keep realistic boundaries
        val = Math.round(Math.max(0, val));
        if(ind.target <= 2) val = clamp(val, 0, 6);
        if(ind.target <= 6) val = clamp(val, 0, 15);
        if(ind.id==="ops_incidents") val = clamp(val, 0, 6);
      }
      return val;
    }

    function score(ind, value){
      if(ind.better === "low"){
        const ratio = ind.target / Math.max(value, 0.0001);
        return clamp(ratio*100, 0, 100);
      }
      const ratio = value / Math.max(ind.target, 0.0001);
      return clamp(ratio*100, 0, 100);
    }
    function statusOf(ind, value){
      const s = score(ind, value);
      if(s >= 100) return {label:"مستقر", cls:"good"};
      if(s >= 90)  return {label:"مراقبة", cls:"warn"};
      return {label:"تدخل", cls:"bad"};
    }
    function pctBar(ind, value){
      if(ind.better === "low"){
        return clamp((ind.target / Math.max(value,0.0001))*100, 0, 100);
      }
      return clamp((value / Math.max(ind.target,0.0001))*100, 0, 100);
    }
    function labelPeriod(){
      return period==="daily"?"يومي":period==="weekly"?"أسبوعي":period==="monthly"?"شهري":"ربع سنوي";
    }
    function labelLevel(){
      return level==="exec"?"تنفيذي":level==="sup"?"إشرافي":"تشغيلي";
    }
    function ownerShort(owner){
      return owner.split("+")[0].trim();
    }

    function historyBars(ind){
      const from = fromInput?.value || "";
      const to   = toInput?.value || "";
      const baseSeed = hashStr(ind.id+"|hist|"+level+"|"+period+"|"+from+"|"+to);
      const bars=[];
      for(let i=0;i<6;i++){
        const r = rand01(baseSeed + i*97);
        const h = 34 + Math.round(r*62);
        bars.push(h);
      }
      return bars;
    }

    /* =========================
       Filters + sorting
       ========================= */
    function getAllForLevel(){
      return DATA.filter(x => x.level === level);
    }

    function initFilterOptions(){
      // Domains
      const domains = Array.from(new Set(DATA.map(x=>x.domain))).sort((a,b)=>a.localeCompare(b,'ar'));
      domains.forEach(d=>{
        const opt=document.createElement("option");
        opt.value=d; opt.textContent=d;
        filterDomain.appendChild(opt);
      });

      // Owners
      const owners = Array.from(new Set(DATA.map(x=>x.owner))).sort((a,b)=>a.localeCompare(b,'ar'));
      owners.forEach(o=>{
        const opt=document.createElement("option");
        opt.value=o; opt.textContent=o;
        filterOwner.appendChild(opt);
      });
    }

    function applyFilters(list){
      const d = filterDomain.value;
      const o = filterOwner.value;
      const s = filterStatus.value;

      return list.filter(it=>{
        if(d!=="all" && it.ind.domain!==d) return false;
        if(o!=="all" && it.ind.owner!==o) return false;
        if(s!=="all" && it.st.cls!==s) return false;
        return true;
      });
    }

    function sortList(list){
      const mode = sortBy.value;
      if(mode==="name"){
        return list.sort((a,b)=>a.ind.name.localeCompare(b.ind.name,'ar'));
      }
      if(mode==="gap"){
        return list.sort((a,b)=>b.gapAbs - a.gapAbs);
      }
      // risk (bad first, then warn, then good), tie by gap
      const rank = {bad:0, warn:1, good:2};
      return list.sort((a,b)=>{
        const ra=rank[a.st.cls], rb=rank[b.st.cls];
        if(ra!==rb) return ra-rb;
        return b.gapAbs - a.gapAbs;
      });
    }

    /* =========================
       Executive summary KPIs (Top 4)
       ========================= */
    function buildSummary(list){
      // compute overall governance health based on scores
      if(!list.length){
        overallVal.textContent = "0%";
        overallBar.style.width = "0%";
        overallLabel.textContent = "—";
        overallDot.style.background = "var(--c2)";
        sumKpis.innerHTML="";
        return;
      }

      let sum=0, wsum=0;
      for(const it of list){
        const w = (it.ind.unit === "%") ? 1.12 : 1.0;
        sum += score(it.ind, it.value) * w;
        wsum += w;
      }
      const ov = Math.round(sum/wsum);
      overallVal.textContent = ov + "%";
      overallBar.style.width = ov + "%";

      const lab = ov>=95 ? "مستقر" : ov>=85 ? "مراقبة" : "تدخل";
      overallLabel.textContent = lab;
      overallDot.style.background = (lab==="مستقر") ? "var(--c1)" : (lab==="مراقبة") ? "var(--c3)" : "var(--c2)";

      // pick 4 headline indicators (logical by domain)
      const headline = pickHeadlineIndicators();
      sumKpis.innerHTML = headline.map(h => renderSummaryBox(h, list)).join("");
    }

    function pickHeadlineIndicators(){
      // fixed mapping for professionalism
      return [
        {key:"الحوكمة", hint:"سجل القرار", selector:(it)=>it.ind.id==="gov_decision_log"},
        {key:"المخاطر", hint:"حرجة مفتوحة", selector:(it)=>it.ind.id==="risk_open_count"},
        {key:"الزمن", hint:"التزام الجدول", selector:(it)=>it.ind.id==="del_schedule"},
        {key:"المالية", hint:"ضبط الميزانية", selector:(it)=>it.ind.id==="fin_budget_control"},
      ];
    }

    function renderSummaryBox(h, list){
      const found = list.find(h.selector);
      if(!found){
        return `<div class="sum-box">
          <div class="t">${h.key}<span class="trend flat">—</span></div>
          <div class="n"><span class="unit">—</span>—</div>
          <div class="bar" style="margin-top:10px"><span style="width:0%"></span></div>
        </div>`;
      }

      const pct = Math.round(pctBar(found.ind, found.value));
      const tclass = found.ind.trend==="up"?"up":found.ind.trend==="down"?"down":"flat";
      const ttext = found.ind.trend==="up"?"تحسن":found.ind.trend==="down"?"تراجع":"ثبات";

      const display = (found.ind.unit==="%")
        ? `${found.value}<span class="unit">%</span>`
        : `${found.value}<span class="unit">${found.ind.unit||"عدد"}</span>`;

      return `<div class="sum-box">
        <div class="t">${h.key} • ${h.hint}<span class="trend ${tclass}">${ttext}</span></div>
        <div class="n">${display}</div>
        <div class="bar" style="margin-top:10px"><span style="width:${pct}%"></span></div>
      </div>`;
    }

    /* =========================
       Actions plan (more realistic)
       ========================= */
    function actionPlan(ind, st){
      const base =
`1) تدقيق القياس خلال 24 ساعة:
   - تأكيد مصدر البيانات (${ind.source}) + اكتمال الفترة.
   - مراجعة العينة/الاستثناءات والتأكد من عدم وجود ازدواجية.

2) معالجة سريعة خلال 72 ساعة:
   - تعيين مالك إجراء + موعد إغلاق واضح.
   - تنفيذ تدخل مباشر في أعلى نقطة تأثير (اعتماد/صلاحية/خطوة عملية).

3) معالجة جذرية خلال 7–10 أيام:
   - تحليل السبب الجذري (5 Whys) وربطها بإجراء منع تكرار.
   - تحديث Policy/SOP/RACI إذا كان السبب حوكميًا.

4) توثيق واعتماد:
   - توثيق Before/After + رفع دليل الإغلاق.
   - تحديث سجل القرارات والمخاطر وإقفال الإجراء رسميًا.`;

      if(st.label==="مستقر"){
        return `استمرار مضبوط + تحسين تدريجي:\n${base}\n\n5) تحسين اختياري:\n   - رفع مستوى النضج أو توسيع نطاق القياس دون التأثير على التشغيل.`;

      return `تدخل عاجل + تصعيد رسمي:\n${base}\n\n5) تصعيد خلال 72 ساعة:\n   - عرض الانحراف بخيارات قرار (استمرار/تعزيز موارد/تعديل أولويات).`;

      cards=[];

      const rangeTxt = (fromInput.value && toInput.value) ? ` • (${fromInput.value} → ${toInput.value})` : "";
      subtitle.textContent = `المستوى: ${labelLevel()} • الفترة: ${labelPeriod()}${rangeTxt} • بيانات تشغيلية تقديرية ثابتة نسبيًا`;

      const computed = items.map(ind=>{
        const value = computeValue(ind);
        const st = statusOf(ind, value);
        const pct = pctBar(ind, value);

        const gap = (ind.better==="low") ? (value - ind.target) : (ind.target - value);
        const gapAbs = Math.abs(gap);

        const gapText =
          (ind.unit === "%") ? `${Math.round(gapAbs)}%` :
          `${Math.round(gapAbs)}`;

        return {ind, value, st, pct, gapAbs, gapText};
      });

    }

    /* =========================
       Bind controls
       ========================= */
    levelBtns.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        levelBtns.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        level = btn.getAttribute("data-level") || "exec";
        activeIdx = 0;
        render();
      });
    });

    periodBtns.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        periodBtns.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        period = btn.getAttribute("data-period") || "daily";
        render();
      });
    });

    [fromInput, toInput, filterDomain, filterOwner, filterStatus, sortBy].forEach(el=>{
      el.addEventListener("change", ()=>{ activeIdx=0; render(); });
    });

    btnPresent.addEventListener("click", ()=>{
      document.body.classList.toggle("presentation");
      btnPresent.classList.toggle("active", document.body.classList.contains("presentation"));
      btnPresent.textContent = document.body.classList.contains("presentation") ? "إلغاء وضع العرض" : "وضع عرض";
    });

    btnReset.addEventListener("click", ()=>{
      fromInput.value = "";
      toInput.value = "";
      filterDomain.value = "all";
      filterOwner.value = "all";
      filterStatus.value = "all";
      sortBy.value = "risk";
      periodBtns.forEach(b=>b.classList.remove("active"));
      periodBtns[0].classList.add("active");
      period = "daily";
      activeIdx = 0;
      render();
    });

    /* =========================
       Init
       ========================= */
    initFilterOptions();
    render();

  }catch(e){
    // silent
  }
})();
</script>
</body>
</html>
