<section id="governance-dashboard-scope" dir="rtl" lang="ar">

  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&amp;display=swap" rel="stylesheet">

  <style>
    /* =========================
       SCOPE + TOKENS (ONLY 3 COLORS)
       ========================= */
    #governance-dashboard-scope{
      --c1:#006250;  /* primary */
      --c2:#273233;  /* dark */
      --c3:#15adff;  /* accent */

      --bg:#ffffff;
      --panel:#f7f9fb;
      --card:#ffffff;
      --line:#e6edf2;
      --muted:#6b7280;

      --r:22px;
      --shadow:0 16px 44px rgba(39,50,51,.10);
      --shadowSoft:0 18px 40px rgba(39,50,51,.12); /* hover soft */
      --shadowFocus:0 20px 48px rgba(21,173,255,.14); /* hover accent */
      background:var(--bg);
      font-family:"Almarai",sans-serif;
      padding:28px 16px;
    }
    #governance-dashboard-scope *{box-sizing:border-box}

    /* Container full width */
    #governance-dashboard-scope .gd-container{max-width:100%; margin:0 auto;}

    /* =========================
       HEADER
       ========================= */
    #governance-dashboard-scope .gd-header{
      display:flex; flex-wrap:wrap; gap:12px 14px;
      justify-content:space-between; align-items:center;
      margin-bottom:16px;
    }
    #governance-dashboard-scope .gd-head-title{
      display:flex; flex-direction:column; gap:4px;
    }
    #governance-dashboard-scope .gd-head-title h2{
      margin:0; font-size:18px; font-weight:800; color:var(--c2);
      letter-spacing:.2px;
    }
    #governance-dashboard-scope .gd-sub{
      font-size:12px; color:var(--muted);
    }

    #governance-dashboard-scope .gd-controls{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }

    /* pills group */
    #governance-dashboard-scope .gd-group{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      padding:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
    }
    #governance-dashboard-scope button{
      border:none;
      background:transparent;
      color:var(--c2);
      padding:8px 14px;
      border-radius:999px;
      cursor:pointer;
      font-family:inherit;
      font-size:13px;
      font-weight:700;
      transition:transform .18s ease, box-shadow .18s ease, background .25s ease, color .25s ease;
      outline:none;
      user-select:none;
    }
    #governance-dashboard-scope button:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 18px rgba(39,50,51,.10);
      background:#eef7ff;
      color:var(--c2);
    }
    #governance-dashboard-scope button.active{
      background:linear-gradient(135deg,var(--c2),var(--c1));
      color:#fff;
      box-shadow:0 16px 30px rgba(0,98,80,.22);
    }

    /* Dates */
    #governance-dashboard-scope .gd-dates{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      padding:8px 10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
    }
    #governance-dashboard-scope .gd-dates label{font-size:12px; color:var(--muted); font-weight:700;}
    #governance-dashboard-scope input[type="date"]{
      border:1px solid var(--line);
      background:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-family:inherit;
      font-size:12px;
      color:var(--c2);
      outline:none;
    }

    /* =========================
       OVERALL
       ========================= */
    #governance-dashboard-scope .gd-overall{
      border-radius:var(--r);
      border:1px solid var(--line);
      background:linear-gradient(135deg, rgba(21,173,255,.10), rgba(0,98,80,.08), #fff);
      box-shadow:var(--shadow);
      padding:18px;
      position:relative;
      overflow:hidden;
      margin-bottom:14px;
    }
    #governance-dashboard-scope .gd-overall::before{
      content:"";
      position:absolute; inset:-2px;
      background:radial-gradient(circle at 20% 25%, rgba(21,173,255,.18), transparent 40%),
                 radial-gradient(circle at 88% 40%, rgba(0,98,80,.12), transparent 45%);
      pointer-events:none;
    }
    #governance-dashboard-scope .gd-overall .row{
      position:relative;
      display:flex; flex-wrap:wrap; gap:12px;
      justify-content:space-between; align-items:flex-end;
    }
    #governance-dashboard-scope .gd-overall .label{
      font-size:13px; color:var(--muted); font-weight:800;
    }
    #governance-dashboard-scope .gd-overall .value{
      font-size:42px; line-height:1;
      font-weight:900;
      color:#000 !important;
      -webkit-text-fill-color:#000 !important;
    }
    #governance-dashboard-scope .gd-pill{
      display:inline-flex; align-items:center; gap:8px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      font-weight:800;
      color:var(--c2);
    }
    #governance-dashboard-scope .dot{
      width:10px; height:10px; border-radius:50%;
      background:var(--c1);
      box-shadow:0 0 0 6px rgba(0,98,80,.10);
    }

    /* Overall bar */
    #governance-dashboard-scope .gd-bar{
      margin-top:12px;
      height:10px;
      background:#eef2f6;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      position:relative;
    }
    #governance-dashboard-scope .gd-bar span{
      display:block; height:100%; width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--c1),var(--c3));
      transition:width .65s ease;
      position:relative;
      overflow:hidden;
    }

    /* Shine moves ONLY on hover (visual, percent fixed) */
    #governance-dashboard-scope .gd-bar span::after{
      content:"";
      position:absolute; top:0; left:-45%;
      width:45%; height:100%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,.75), transparent);
      opacity:0;
      transition:opacity .2s ease;
    }
    #governance-dashboard-scope .gd-card:hover .gd-bar span::after,
    #governance-dashboard-scope .gd-overall:hover .gd-bar span::after{
      opacity:1;
      animation:flow 2.4s linear infinite;
    }
    @keyframes flow{
      0%{left:-45%}
      100%{left:120%}
    }

    /* =========================
       GRID
       ========================= */
    #governance-dashboard-scope .gd-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(270px, 1fr));
      gap:14px;
      margin-top:10px;
    }

    /* Cards */
    #governance-dashboard-scope .gd-card{
      background:linear-gradient(135deg, rgba(21,173,255,.06), rgba(0,98,80,.05), #fff);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:16px;
      box-shadow:0 10px 26px rgba(39,50,51,.07);
      cursor:pointer;
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      position:relative;
      overflow:hidden;
    }

    /* ✅ HOVER SHADOW (NO MOVING RING) */
    #governance-dashboard-scope .gd-card::before{ display:none !important; } /* remove ring */
    #governance-dashboard-scope .gd-card:hover{
      transform:translateY(-4px);
      border-color:rgba(21,173,255,.35);
      box-shadow:var(--shadowSoft);
    }

    #governance-dashboard-scope .gd-card.active{
      border-color:rgba(0,98,80,.40);
      box-shadow:var(--shadowFocus);
      transform:translateY(-2px);
    }

    #governance-dashboard-scope .gd-top{
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    #governance-dashboard-scope .gd-name{
      font-size:13px; font-weight:900; color:var(--c2);
      line-height:1.5;
    }
    #governance-dashboard-scope .gd-meta{
      font-size:12px; color:var(--muted); font-weight:700;
      margin-top:2px;
    }

    #governance-dashboard-scope .gd-value{
      font-size:34px; font-weight:900;
      color:#000 !important;
      -webkit-text-fill-color:#000 !important;
      line-height:1.1;
      text-align:left;
      white-space:nowrap;
    }
    #governance-dashboard-scope .gd-unit{font-size:12px; color:var(--muted); font-weight:800; margin-right:6px;}

    /* Status chip */
    #governance-dashboard-scope .gd-status{
      margin-top:10px;
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:900;
      color:var(--c2);
      width:max-content;
    }
    #governance-dashboard-scope .gd-status .s-dot{
      width:8px; height:8px; border-radius:50%;
      background:var(--c1);
      box-shadow:0 0 0 5px rgba(0,98,80,.10);
    }
    #governance-dashboard-scope .gd-status.warn .s-dot{background:var(--c3); box-shadow:0 0 0 5px rgba(21,173,255,.12)}
    #governance-dashboard-scope .gd-status.bad  .s-dot{background:var(--c2); box-shadow:0 0 0 5px rgba(39,50,51,.12)}

    /* Mini blocks */
    #governance-dashboard-scope .gd-mini{
      margin-top:10px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:8px;
    }
    #governance-dashboard-scope .gd-mini .b{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }
    #governance-dashboard-scope .gd-mini .b span{
      display:block; font-size:11px; color:var(--muted); font-weight:800;
      margin-bottom:4px;
    }
    #governance-dashboard-scope .gd-mini .b strong{
      display:block; font-size:13px; color:var(--c2); font-weight:900;
    }

    /* =========================
       DETAILS PANEL
       ========================= */
    #governance-dashboard-scope .gd-details{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:var(--r);
      background:linear-gradient(135deg, rgba(21,173,255,.06), rgba(0,98,80,.05), #fff);
      box-shadow:var(--shadow);
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    #governance-dashboard-scope .gd-details h3{
      margin:0 0 8px;
      font-size:16px;
      font-weight:900;
      color:var(--c2);
    }
    #governance-dashboard-scope .gd-details .hint{
      margin:0 0 12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
      font-weight:700;
    }
    #governance-dashboard-scope .gd-details-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
    }
    #governance-dashboard-scope .gd-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    #governance-dashboard-scope .gd-box:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(39,50,51,.10);
    }
    #governance-dashboard-scope .gd-box span{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:6px;
    }
    #governance-dashboard-scope .gd-box strong{
      display:block;
      font-size:14px;
      color:var(--c2);
      font-weight:900;
      line-height:1.7;
      white-space:pre-line;
    }

    /* tiny history bars */
    #governance-dashboard-scope .hist{
      margin-top:10px;
      display:flex; gap:6px; align-items:flex-end;
      height:44px;
    }
    #governance-dashboard-scope .hist i{
      display:block;
      width:100%;
      max-width:18px;
      flex:1;
      border-radius:999px;
      background:linear-gradient(180deg,var(--c3), var(--c1));
      opacity:.85;
      transform-origin:bottom;
      transition:transform .18s ease;
    }
    #governance-dashboard-scope .gd-box:hover .hist i{transform:scaleY(1.03)}

    /* Numbers black everywhere */
    #governance-dashboard-scope .gd-details .num,
    #governance-dashboard-scope .gd-box .num,
    #governance-dashboard-scope .gd-mini strong,
    #governance-dashboard-scope .gd-overall .value{
      color:#000 !important;
      -webkit-text-fill-color:#000 !important;
    }
  </style>

  <div class="gd-container">

    <div class="gd-header">
      <div class="gd-head-title">
        <h2>لوحة الحوكمة التفاعلية للمبادرة</h2>
        <div class="gd-sub" id="gdSubtitle">بيانات تجريبية واقعية • تتغير حسب الفترة والتاريخ</div>
      </div>

      <div class="gd-controls">
        <div class="gd-group" aria-label="Levels">
          <button type="button" class="active" data-level="exec">تنفيذي</button>
          <button type="button" data-level="sup">إشرافي</button>
          <button type="button" data-level="ops">تشغيلي</button>
        </div>

        <div class="gd-group" aria-label="Periods">
          <button type="button" class="active" data-period="daily">يومي</button>
          <button type="button" data-period="weekly">أسبوعي</button>
          <button type="button" data-period="monthly">شهري</button>
          <button type="button" data-period="quarterly">ربعي</button>
        </div>

        <div class="gd-dates" aria-label="Date Range">
          <label>من</label><input type="date" id="gdFrom">
          <label>إلى</label><input type="date" id="gdTo">
        </div>
      </div>
    </div>

    <div class="gd-overall" id="gdOverallPanel">
      <div class="row">
        <div>
          <div class="label">المؤشر العام للحوكمة</div>
          <div class="value" id="gdOverallValue">0%</div>
        </div>
        <div class="gd-pill">
          <span class="dot" id="gdOverallDot"></span>
          <span id="gdOverallLabel">—</span>
        </div>
      </div>
      <div class="gd-bar">
        <span id="gdOverallBar" style="width:0%"></span>
      </div>
    </div>

    <div class="gd-grid" id="gdGrid"></div>

    <div class="gd-details" id="gdDetails">
      <h3>اختر مؤشرًا</h3>
      <p class="hint">اضغط على أي بطاقة لعرض تفاصيل الحوكمة والأدلة وسجل آخر 6 فترات. التأثيرات تظهر عند مرور الماوس فقط.</p>
    </div>

  </div>

  <script>
    (function(){
      try{
        const scope = document.getElementById("governance-dashboard-scope");
        if(!scope) return;

        const grid = scope.querySelector("#gdGrid");
        const details = scope.querySelector("#gdDetails");
        const subtitle = scope.querySelector("#gdSubtitle");

        const overallValue = scope.querySelector("#gdOverallValue");
        const overallBar = scope.querySelector("#gdOverallBar");
        const overallLabel = scope.querySelector("#gdOverallLabel");
        const overallDot = scope.querySelector("#gdOverallDot");

        const levelButtons = scope.querySelectorAll("[data-level]");

        if(!grid || !details || !overallValue || !overallBar || !overallLabel || !overallDot) return;

        let level = "exec";
        let period = "daily";
        let activeIdx = 0;

            risk:"غياب الميثاق يخلق تضارب صلاحيات وتأخير قرارات.",
            formula:"(بنود الميثاق المعتمدة ÷ إجمالي البنود) × 100",
            base:100, volatility:"low"
          },
          {id:"launch_okrs", level:"exec", stage:"مرحلة الانطلاق | 2026-01", name:"تحديد الأهداف الاستراتيجية ومؤشرات النجاح (OKRs/KPIs)", unit:"%", target:100, better:"high",
            def:"توثيق واعتماد OKRs/KPIs مع تعريفات قياس واضحة وربطها بمصادر البيانات.",

          {id:"launch_resources", level:"exec", stage:"مرحلة الانطلاق | 2026-01", name:"جاهزية الموارد (المالية، البشرية، التقنية)", unit:"%", target:95, better:"high",

          },
          {id:"qw_count", level:"sup", stage:"مرحلة الفوز السريع | 2026-03", name:"عدد Quick Wins المنجزة", unit:"", target:1, better:"high",

            owner:"PM + فرق التنفيذ",

            base:83, volatility:"med"
          },
          {id:"re_ready", level:"exec", stage:"مرحلة إعادة الانطلاق | 2027-01", name:"جاهزية دورة جديدة بنسبة ≥ 95%", unit:"%", target:95, better:"high",
            def:"جاهزية دورة جديدة تشغيلًا ومواردًا.",
            owner:"المالك + التشغيل + التقنية",
            source:"Checklists",
            evidence:["جاهزية موارد","جاهزية تقنية","خطة تشغيل"],
            risk:"دورة جديدة غير جاهزة تعيد المشاكل.",
            formula:"(عناصر جاهزة ÷ عناصر مطلوبة) × 100",
            base:91, volatility:"med"
          },
          {id:"re_plan", level:"exec", stage:"مرحلة إعادة الانطلاق | 2027-01", name:"اعتماد خطة التطوير والتحسين", unit:"%", target:100, better:"high",
            def:"اعتماد خطة تطوير وتحسين رسمية.",
            owner:"لجنة التوجيه",
            source:"قرار اعتماد",
            evidence:["خطة تحسين","محضر اعتماد","خارطة طريق"],
            risk:"تحسينات غير معتمدة تبقى حبرًا على ورق.",
            formula:"(تم الاعتماد؟ نعم=100 / لا=0)",
            base:86, volatility:"med"
          },
          {id:"re_launch", level:"exec", stage:"مرحلة إعادة الانطلاق | 2027-01", name:"إطلاق النسخة الجديدة رسميًا", unit:"%", target:100, better:"high",
            def:"إطلاق رسمي للنسخة الجديدة مع إعلان وتشغيل.",
            owner:"المالك + التشغيل + التواصل",
            source:"إعلان + تشغيل",
            evidence:["إعلان","تشغيل فعلي","تحديثات منصات"],
            risk:"تأخر الإطلاق يضعف الاستدامة.",
            formula:"(تم الإطلاق؟ نعم=100 / لا=0)",
            base:84, volatility:"med"
          },

          /* --- Transversal (All the time) --- */
          {id:"x_schedule", level:"exec", stage:"مؤشرات عرضية (تُقاس طوال المبادرة)", name:"نسبة الالتزام بالجدول الزمني العام", unit:"%", target:90, better:"high",
            def:"التزام شامل بالخطة الزمنية طوال المبادرة.",
            owner:"PMO",
            source:"تقارير تقدم",
            evidence:["Baseline","تقارير تقدم","إجراءات تصحيح"],
            risk:"تأخر متكرر يضخم المخاطر والتكاليف.",
            formula:"(منجز وفق الخطة ÷ مخطط) × 100",
            base:89, volatility:"med"
          },
          {id:"x_budget", level:"exec", stage:"مؤشرات عرضية (تُقاس طوال المبادرة)", name:"نسبة الالتزام بالميزانية", unit:"%", target:95, better:"high",
            def:"الإنفاق ضمن المعتمد طوال المبادرة.",
            owner:"المالية",
            source:"تقارير مالية",
            evidence:["صرف","التزامات","تسويات"],
            risk:"تجاوز مالي يوقف أو يخفض نطاق العمل.",
            formula:"(الإنفاق ضمن المعتمد ÷ المعتمد) × 100",
            base:94, volatility:"med"
          },
          {id:"x_risks", level:"sup", stage:"مؤشرات عرضية (تُقاس طوال المبادرة)", name:"عدد المخاطر المفتوحة مقابل المغلقة", unit:"", target:12, better:"low",
            def:"عدد المخاطر المفتوحة (الأفضل أن تكون منخفضة).",
            owner:"GRC/PMO",
            source:"Risk Register",
            evidence:["مخاطر مفتوحة","مخاطر مغلقة","خطط معالجة"],
            risk:"مخاطر مفتوحة كثيرة تعني هشاشة تنفيذ.",
            formula:"عدد المخاطر المفتوحة خلال الفترة",
            base:9, volatility:"high"
          },
          {id:"x_stake", level:"sup", stage:"مؤشرات عرضية (تُقاس طوال المبادرة)", name:"مستوى رضا أصحاب المصلحة", unit:"%", target:85, better:"high",
            def:"رضا أصحاب المصلحة عن الأداء العام والحوكمة.",
            owner:"PMO + تجربة العميل",
            source:"استبيانات + مقابلات",
            evidence:["CSAT","مقابلات","تحليل شكاوى"],
            risk:"رضا منخفض يسبب مقاومة وتغيير.",
            formula:"(نقاط الرضا ÷ أعلى نقاط) × 100",
            base:83, volatility:"med"
          },
          {id:"x_gov", level:"exec", stage:"مؤشرات عرضية (تُقاس طوال المبادرة)", name:"نضج الحوكمة واتخاذ القرار", unit:"%", target:90, better:"high",
            def:"مدى نضج آليات الحوكمة (لجان، قرارات، تصعيد، وثائق).",
            owner:"لجنة التوجيه + PMO",
            source:"محاضر + قرارات",
            evidence:["Minutes","Decision log","RACI"],
            risk:"حوكمة ضعيفة = قرارات متأخرة.",
            formula:"(عناصر نضج مكتملة ÷ عناصر مطلوبة) × 100",
            base:82, volatility:"med"
          }
        ];

        /* ========= deterministic mild variance (more “real”) ========= */
        function hashStr(s){
          let h=2166136261;
          for(let i=0;i<s.length;i++){
            h^=s.charCodeAt(i);
            h=Math.imul(h,16777619);
          }
          return (h>>>0);
        }
        function rand01(seed){
          seed ^= seed << 13; seed >>>= 0;
          seed ^= seed >> 17; seed >>>= 0;
          seed ^= seed << 5;  seed >>>= 0;
          return (seed >>> 0) / 4294967295;
        }
        function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
        function daysBetween(a,b){
          const da=new Date(a), db=new Date(b);
          const diff=(db-da)/(1000*60*60*24);
          if(!isFinite(diff)) return 0;
          return Math.abs(Math.round(diff));
        }

        // ✅ smaller variance than before (realistic)
        function periodAmp(p){
          return p==="daily" ? 0.012 :
                 p==="weekly"? 0.020 :
                 p==="monthly"?0.028 : 0.035;
        }
        function volAmp(v){
          return v==="low" ? 0.55 : v==="med" ? 0.85 : 1.05;
        }

        function computeValue(ind){
          const from = fromInput?.value || "";
          const to   = toInput?.value || "";
          const d = (from && to) ? daysBetween(from,to) : 0;

          // up to +2.5% extra drift with long ranges
          const dateInfluence = clamp(d/120, 0, 1) * 0.025;

          const seed = hashStr(ind.id+"|"+level+"|"+period+"|"+from+"|"+to);
          const r = rand01(seed);
          const n = (r - 0.5) * 2; // -1..1

          const amp = (periodAmp(period) + dateInfluence) * volAmp(ind.volatility);
          let val = ind.base * (1 + n * amp);

          if(ind.unit === "%"){
            val = Math.round(clamp(val, 0, 100));
            if(ind.base >= 99) val = 100; // keep 100-ish stable
          } else if(ind.unit === "دقيقة"){
            val = Math.round(clamp(val, 0.1, 60) * 10) / 10;
          } else {
            val = Math.round(Math.max(0, val));
            if(ind.target <= 3) val = clamp(val, 0, 8);
            if(ind.target >= 1000) val = clamp(val, 0, 3500);
            if(ind.target === 60) val = clamp(val, 0, 180);
          }
          return val;
        }

        function score(ind, value){
          if(ind.better === "low"){
            const ratio = ind.target / Math.max(value, 0.0001);
            return clamp(ratio*100, 0, 100);
          }
          const ratio = value / Math.max(ind.target, 0.0001);
          return clamp(ratio*100, 0, 100);
        }

        function statusLabel(ind, value){
          const s = score(ind, value);
          if(s >= 100) return {label:"مستقر", cls:"good"};
          if(s >= 90)  return {label:"مراقبة", cls:"warn"};
          return {label:"تدخل", cls:"bad"};
        }

        function percentBar(ind, value){
          if(ind.better === "low"){
            return clamp((ind.target / Math.max(value,0.0001))*100, 0, 100);
          }
          return clamp((value / Math.max(ind.target,0.0001))*100, 0, 100);
        }

        function labelPeriod(){
          return period==="daily"?"يومي":period==="weekly"?"أسبوعي":period==="monthly"?"شهري":"ربع سنوي";
        }
        function labelLevel(){
          return level==="exec"?"تنفيذي":level==="sup"?"إشرافي":"تشغيلي";
        }

        function getItems(){
          return DATA.filter(x => x.level === level);
        }

        /* ========= improved detailed actions ========= */
        function buildActionPlan(ind, st){
          const base =
`1) التحقق من سبب الانحراف:
   - مراجعة مصدر البيانات (${ind.source}) والتأكد من اكتمال الإدخالات للفترة.
   - مقارنة القيمة الحالية بالمستهدف وتحليل الفجوة (Gap) ومصدرها (عملية/موارد/تقنية).

2) إجراء تصحيحي سريع (48–72 ساعة):
   - تعيين مالك إجراء واضح + موعد إغلاق.
   - تنفيذ تعديل مباشر على نقطة الألم الأعلى أثرًا (خطوة خدمة/اعتماد/تنسيق).

3) إجراء جذري (Root Cause خلال 7–10 أيام):
   - تحليل الأسباب الأساسية (5 Whys) وربطها بخطة منع تكرار.
   - تحديث SOP/Policy/RACI إذا كان السبب حوكميًا.

4) التحقق والاعتماد:
   - رفع دليل الإغلاق (Before/After + أرقام) واعتماد الجهة المالكة.
   - تحديث سجل القرارات والمخاطر.`;

          if(st.label==="مستقر"){
            return `استمرار مضبوط + تحسين تدريجي:\n${base}\n\n5) تحسين اختياري:\n   - رفع السقف (Stretch Target) أو توسيع نطاق القياس دون التأثير على baseline.`;
          }
          if(st.label==="مراقبة"){
            return `مراقبة نشطة + رفع وتيرة المتابعة:\n${base}\n\n5) تصعيد مشروط:\n   - إذا لم تتحسن القيمة في دورتين متتاليتين، يتم التصعيد للجنة التوجيه بخطة معالجة مختصرة.`;
          }
          return `تدخل عاجل + تصعيد رسمي:\n${base}\n\n5) تصعيد فوري:\n   - عرض الانحراف على لجنة التوجيه خلال 72 ساعة مع 3 خيارات قرار (استمرار/تعديل نطاق/تعزيز موارد).`;
        }

        /* ========= history ========= */
        function buildHistory(ind){
          const bars=[];
          const baseSeed = hashStr(ind.id+"|hist|"+level+"|"+(fromInput.value||"")+"|"+(toInput.value||"")+"|"+period);
          for(let i=0;i<6;i++){
            const r = rand01(baseSeed + i*97);
            const h = 34 + Math.round(r*62);
            bars.push(h);
          }
          return bars;
        }

        /* ========= Render ========= */
        let cards = [];

        function render(){
          grid.innerHTML = "";
          cards = [];

          const items = getItems();

          subtitle.textContent =
            `المستوى: ${labelLevel()} • الفترة: ${labelPeriod()}${
              (fromInput.value && toInput.value) ? ` • (${fromInput.value} → ${toInput.value})` : ""
            }`;

          items.forEach((ind, idx) => {
            const value = computeValue(ind);
            const st = statusLabel(ind, value);
            const pct = percentBar(ind, value);

            const gap = (ind.better==="low") ? (value - ind.target) : (ind.target - value);
            const gapAbs = Math.abs(gap);

            const gapText =
              (ind.unit === "%") ? `${Math.round(gapAbs)}%` :
              (ind.unit === "دقيقة") ? `${gapAbs.toFixed(1)}` :
              `${Math.round(gapAbs)}`;

            const ownerShort = ind.owner.split("+")[0].trim();

            const card = document.createElement("div");
            card.className = "gd-card";
            card.innerHTML = `
              <div class="gd-top">
                <div>
                  <div class="gd-name">${ind.name}</div>
                  <div class="gd-meta">${ind.stage} • ${labelPeriod()}</div>
                </div>
                <div class="gd-value">
                  <span class="gd-unit">${ind.unit || ""}</span>${value}
                </div>
              </div>

              <div class="gd-status ${st.cls}">
                <span class="s-dot"></span>
                ${st.label}
              </div>

              <div class="gd-bar"><span style="width:${pct.toFixed(0)}%"></span></div>

              <div class="gd-mini">
                <div class="b"><span>المستهدف</span><strong class="num">${ind.target} ${ind.unit||""}</strong></div>
                <div class="b"><span>الفجوة</span><strong class="num">${gapText}</strong></div>
                <div class="b"><span>المالك</span><strong>${ownerShort}</strong></div>
              </div>
            `;

            card.addEventListener("click", () => activate(idx));
            grid.appendChild(card);

            cards.push({ind, value, el:card});
          });

          activeIdx = Math.max(0, Math.min(activeIdx, cards.length-1));
          if(cards.length){
            activate(activeIdx, true);
          }else{
            updateOverall([]);
            details.innerHTML = `
              <h3>لا توجد مؤشرات لهذا المستوى</h3>
              <p class="hint">جرّب تغيير المستوى أو الفترة.</p>
            `;
          }
        }

        function updateOverall(list){
          if(!list.length){
            overallValue.textContent = "0%";
            overallBar.style.width = "0%";
            overallLabel.textContent = "—";
            overallDot.style.background = "var(--c2)";
            return;
          }
          let sum=0, wsum=0;
          for(const it of list){
            const w = (it.ind.unit === "%") ? 1.12 : (it.ind.unit==="دقيقة"?1.05:1.0);
            sum += score(it.ind, it.value) * w;
            wsum += w;
          }
          const ov = Math.round(sum/wsum);
          overallValue.textContent = ov + "%";
          overallBar.style.width = ov + "%";

          const lab = ov>=95 ? "مستقر" : ov>=85 ? "مراقبة" : "تدخل";
          overallLabel.textContent = lab;
          overallDot.style.background = (lab==="مستقر") ? "var(--c1)" : (lab==="مراقبة") ? "var(--c3)" : "var(--c2)";
        }

        function activate(idx, quiet){
          if(!cards.length || !cards[idx]) return;

          cards.forEach((c,i)=>c.el.classList.toggle("active", i===idx));
          activeIdx = idx;

          updateOverall(cards);

          const cur = cards[idx];
          const ind = cur.ind;
          const val = cur.value;
          const st = statusLabel(ind, val);
          const pct = percentBar(ind, val);

          const from = fromInput.value, to = toInput.value;
          const dateTxt = (from && to) ? `نطاق مخصص: ${from} → ${to}` : `حسب الفترة: ${labelPeriod()}`;

          const evidenceList = ind.evidence.map(x => `• ${x}`).join("\n");
          const hist = buildHistory(ind);
          const histHtml = hist.map(h => `<i style="height:${h}%"></i>`).join("");

          const actionPlan = buildActionPlan(ind, st);

          details.innerHTML = `
            <h3>${ind.name}</h3>
            <p class="hint">${dateTxt}. اضغط على أي مؤشر لتحديث هذه الصفحة بالتفاصيل والأدلة والإجراء.</p>

            <div class="gd-details-grid">
              <div class="gd-box">
                <span>القيمة الحالية</span>
                <strong class="num">${val} ${ind.unit||""}</strong>
                <div class="hist">${histHtml}</div>
              </div>

              <div class="gd-box">
                <span>المستهدف</span>
                <strong class="num">${ind.target} ${ind.unit||""}</strong>
                <span style="margin-top:10px; display:block;">نسبة التقدم</span>
                <strong class="num">${pct.toFixed(0)}%</strong>
              </div>

              <div class="gd-box">
                <span>حالة الحوكمة</span>
                <strong>${st.label}</strong>
                <span style="margin-top:10px; display:block;">تعريف المؤشر</span>
                <strong>${ind.def}</strong>
              </div>

              <div class="gd-box">
                <span>المالك + مصدر البيانات</span>
                <strong>${ind.owner}</strong>
                <span style="margin-top:10px; display:block;">المصدر</span>
                <strong>${ind.source}</strong>
              </div>

              <div class="gd-box">
                <span>الأدلة الداعمة</span>
                <strong>${evidenceList}</strong>
              </div>

              <div class="gd-box">
                <span>المخاطر المرتبطة</span>
                <strong>${ind.risk}</strong>
                <span style="margin-top:10px; display:block;">طريقة الاحتساب</span>
                <strong>${ind.formula}</strong>
              </div>

              <div class="gd-box">
                <span>الإجراء المقترح (تفصيلي وقابل للتنفيذ)</span>
                <strong>${actionPlan}</strong>
              </div>
            </div>
          `;

          if(!quiet){
            details.scrollIntoView({behavior:"smooth", block:"start"});
          }
        }

        /* ========= Bind controls ========= */
        levelButtons.forEach(btn=>{
          btn.addEventListener("click", ()=>{
            levelButtons.forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            level = btn.getAttribute("data-level") || "exec";
            activeIdx = 0;
            render();
          });
        });

        periodButtons.forEach(btn=>{
          btn.addEventListener("click", ()=>{
            periodButtons.forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            period = btn.getAttribute("data-period") || "daily";
            render();
          });
        });

        if(fromInput) fromInput.addEventListener("change", render);
        if(toInput) toInput.addEventListener("change", render);

        /* ========= Init ========= */
        render();

      }catch(e){
        /* swallow errors to avoid Odoo modal */
      }
    })();
  </script>
